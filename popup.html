<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 220px; padding: 10px; font-family: Arial, sans-serif; }
        button { width: 100%; margin-bottom: 8px; padding: 8px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background-color: #f8f9fa; }
        button:hover { background-color: #e2e6ea; }
        label { display: block; margin-bottom: 12px; font-size: 14px; cursor: pointer; }
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
        #btnClearList { background-color: #ffebee; border-color: #ffcdd2; color: #c62828; }
        #btnClearList:hover { background-color: #ffcdd2; }
    </style>
</head>
<body>
<label>
    <input type="checkbox" id="toggleMonitoring"> Monitor URLs
</label>
<label>
    <input type="checkbox" id="toggleSizeCheck"> Enforce Size Limit (>500px)
</label>

<hr>

<button id="btnDownloadAll">Download All Media</button>
<button id="btnDownloadImages">Download Images Only</button>
<button id="btnDownloadVideos">Download Videos Only</button>

<hr>

<button id="btnClearList">Clear List</button>

<script src="popup.js"></script>
</body>
</html>
